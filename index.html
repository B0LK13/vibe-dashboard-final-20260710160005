<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coders — Project Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --amber: #d29922; --orange: #f0883e; --red: #f85149;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
header h1 { font-size: 22px; font-weight: 600; }
header .sub { color: var(--muted); font-size: 13px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat .v { font-size: 26px; font-weight: 700; }
.stat .l { color: var(--muted); font-size: 12px; margin-top: 2px; }
.stat.green .v { color: var(--green); } .stat.amber .v { color: var(--amber); }
.stat.orange .v { color: var(--orange); } .stat.red .v { color: var(--red); }
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filters select, .filters input { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; }
.filters input { flex: 1; min-width: 180px; }
.charts { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
@media (max-width: 1000px) { .charts { grid-template-columns: 1fr; } }
.chartbox { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.chartbox h3 { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
.chartbox canvas { max-height: 210px; }
h2 { font-size: 15px; margin: 18px 0 10px; color: var(--muted); font-weight: 600; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color .15s; }
.card:hover { border-color: var(--accent); }
.card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card .name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
.b-healthy { background: #12261e; color: var(--green); border: 1px solid var(--green); }
.b-watch { background: #2a2312; color: var(--amber); border: 1px solid var(--amber); }
.b-atrisk { background: #2b1d10; color: var(--orange); border: 1px solid var(--orange); }
.b-dormant { background: #2b1214; color: var(--red); border: 1px solid var(--red); }
.b-unscanned { background: #21262d; color: var(--muted); border: 1px solid var(--muted); }
.stat.gray .v { color: var(--muted); }
.card .meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
.bar { height: 5px; background: var(--panel2); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.bar i { display: block; height: 100%; border-radius: 3px; }
.reasons { font-size: 12px; color: var(--muted); line-height: 1.5; display: none; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
.card.open .reasons { display: block; }
.reasons .warn { color: var(--orange); } .reasons .pos { color: var(--green); }
.kvs { display: flex; gap: 14px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
.kvs b { color: var(--text); font-weight: 600; }
table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; font-size: 13px; }
th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-size: 12px; cursor: pointer; user-select: none; background: var(--panel2); position: sticky; top: 0; }
tr:hover td { background: var(--panel2); }
td.num, th.num { text-align: right; }
.tablewrap { max-height: 480px; overflow: auto; border-radius: 10px; border: 1px solid var(--border); }
.score { font-weight: 700; }
footer { color: var(--muted); font-size: 12px; margin-top: 24px; text-align: center; }
.empty { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚀 Vibe Coders — Project Performance Dashboard</h1>
    <span class="sub" id="scanInfo"></span>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input id="search" type="search" placeholder="Search projects…">
    <select id="fDrive"><option value="">All drives</option></select>
    <select id="fCategory"><option value="">All categories</option></select>
    <select id="fTech"><option value="">All tech</option></select>
    <select id="fHealth">
      <option value="">All health</option>
      <option>Healthy</option><option>Watch</option><option>At Risk</option><option>Dormant</option><option>Unscanned</option>
    </select>
    <select id="fSort">
      <option value="score-asc">Needs attention first</option>
      <option value="score-desc">Healthiest first</option>
      <option value="recent">Recently active</option>
      <option value="commits">Most commits (30d)</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>

  <div class="charts">
    <div class="chartbox"><h3>Activity — commits in last 30 days (top 15)</h3><canvas id="cActivity"></canvas></div>
    <div class="chartbox"><h3>Health distribution</h3><canvas id="cHealth"></canvas></div>
    <div class="chartbox"><h3>Tech mix</h3><canvas id="cTech"></canvas></div>
  </div>

  <h2 id="gridTitle">Projects</h2>
  <div class="grid" id="grid"></div>

  <h2>All projects</h2>
  <div class="tablewrap">
  <table id="table">
    <thead><tr>
      <th data-k="name">Project</th><th data-k="category">Category</th><th data-k="tech">Tech</th>
      <th class="num" data-k="score">Health</th><th class="num" data-k="commits30d">Commits 30d</th>
      <th class="num" data-k="totalCommits">Local commits</th><th class="num" data-k="contributors">Contributors</th>
      <th data-k="branch">Branch</th><th data-k="lastActivity">Last activity</th>
    </tr></thead>
    <tbody></tbody>
  </table>
  </div>

  <footer id="footer"></footer>
</div>

// Components: Activity 40% · Momentum 25% · Hygiene 20% · Maturity 15%
function lerp(x, pts) { // pts: [[x,score],...] descending score

    if (ratio >= 1.2) reasons.push({t:'pos', m:`Momentum up: ${p.commits30d} commits in 30d`});
    if (ratio < 0.4 && p.commits90d >= 6) reasons.push({t:'warn', m:`Velocity dropped ${Math.round((1-ratio)*100)}% vs 90-day pace`});
  } else if (p.hasGit && p.totalCommits > 0) { M = 10; }
  // Hygiene: git presence (+ uncommitted/readme when known)
  let H = 100;
  if (!p.hasGit) { H = 25; reasons.push({t:'warn', m:'No version control (no git repo)'}); }
  else {
    if (p.uncommitted != null && p.uncommitted > 0) { H -= Math.min(60, p.uncommitted * 3); reasons.push({t:'warn', m:`${p.uncommitted} uncommitted change${p.uncommitted>1?'s':''}`}); }
    if (p.hasReadme === false) { H -= 15; reasons.push({t:'warn', m:'No README'}); }
  }
  H = Math.max(0, H);
  // Maturity: substance of the project
  const Mat = Math.min(100, (p.hasGit ? Math.min(60, (p.totalCommits||0) * 2) : 20) + Math.min(40, (p.fileCount||0) / 5));
  const comps = [[A,.40],[M,.25],[H,.20],[Mat,.15]].filter(c => c[0] !== null);
  const wsum = comps.reduce((s,c) => s + c[1], 0);
  const score = Math.round(comps.reduce((s,c) => s + c[0]*c[1], 0) / wsum);
  const label = score >= 85 ? 'Healthy' : score >= 70 ? 'Watch' : score >= 50 ? 'At Risk' : 'Dormant';
  if (p.hasGit && p.uncommitted === 0 && age <= 30) reasons.push({t:'pos', m:'Clean working tree'});
  return { score, label, reasons };
}

});

function filtered() {
  let out = projects.filter(p =>
    (!state.q || p.name.toLowerCase().includes(state.q) || p.path.toLowerCase().includes(state.q)) &&
    (!state.drive || p.drive === state.drive) && (!state.cat || p.category === state.cat) &&
    (!state.tech || p.tech === state.tech) && (!state.health || p.label === state.health));

  out.sort((a,b) => s==='score-asc' ? (a.score ?? 101)-(b.score ?? 101) : s==='score-desc' ? (b.score ?? -1)-(a.score ?? -1)

}
